<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 첫 번째 웹사이트</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 16px; padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(99,102,241,0.12); }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 2rem; color: #4f46e5; margin-bottom: 12px; }
    p { color: #6b7280; font-size: 1.05rem; line-height: 1.7; margin-bottom: 10px; }
    .badge { display: inline-block; background: #ede9fe; color: #7c3aed; border-radius: 999px; padding: 6px 18px; font-size: 0.9rem; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">👋</div>
    <h1>안녕하세요!</h1>
    <p>저의 첫 번째 웹사이트에 오신 것을 환영합니다.</p>
    <p>이 페이지는 GitHub Pages로 배포되었습니다.</p>
    <div class="badge">🚀 바이브코딩으로 만들었어요</div>
  </div>
</body>
</html>
