name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: lecture1/mini_sns
        run: npm install

      - name: Build mini_sns
        working-directory: lecture1/mini_sns
        env:
          VITE_SUPABASE_URL: https://rfpxtonokhklsglrnigr.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJmcHh0b25va2hrbHNnbHJuaWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MjkxMjIsImV4cCI6MjA5ODMwNTEyMn0.If_cPqd0SFZbaumzJGeDeq65rpkiw_IAI3_aWmgWSoc
        run: npm run build

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp index.html _site/
          mkdir -p _site/mini_sns
          cp -r lecture1/mini_sns/dist/. _site/mini_sns/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
